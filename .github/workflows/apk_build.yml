name: Build APK (assembleDebug)

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  ANDROID_PLATFORM: 'android-36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  ANDROID_NDK_VERSION: '29.0.14206865'  # optional; installer will attempt to fetch it

jobs:
  build-apk:
    name: Build app_pojavlauncher APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK / Tools
        uses: google-github-actions/setup-android@v2
        with:
          sdk-components: |
            platform-tools
            platforms;${{ env.ANDROID_PLATFORM }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}
        # This action installs Android SDK components and sets ANDROID_SDK_ROOT.

      - name: Accept Android SDK licenses (non-blocking)
        run: yes | sdkmanager --licenses || true

      - name: Print environment (debug)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "Gradle: ./gradlew --version"
          ./gradlew --version

      - name: Build debug APK (assembleDebug) — skip downloadAssets
        run: |
          # Skip repository asset downloads in CI; change to true if you want them
          ./gradlew --no-daemon :app_pojavlauncher:clean :app_pojavlauncher:assembleDebug -PdownloadAssets=false --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            app_pojavlauncher/build/outputs/**/*.apk
            app_pojavlauncher/build/outputs/**/*.aab

      - name: List produced artifacts (for debugging)
        if: always()
        run: |
          echo "Produced files under app_pojavlauncher/build/outputs/apk:"
          ls -la app_pojavlauncher/build/outputs/apk || true
          echo "All APK matches:"
          ls -la app_pojavlauncher/build/outputs/**/*.apk || true
