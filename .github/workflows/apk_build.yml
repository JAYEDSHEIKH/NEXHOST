name: Android CI (assembleDebug)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build (assembleDebug)
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      JAVA_HOME_11: ${{ runner.temp }}/java11

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: gradle

    - name: Show Java and Gradle versions
      run: |
        java -version || true
        ./gradlew -v || true

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper/
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install Android SDK command line tools
      run: |
        set -e
        mkdir -p "$ANDROID_SDK_ROOT"
        cd "$ANDROID_SDK_ROOT"
        # download commandlinetools (Google may update links; adjust if this fails)
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip -d cmdline-tools-temp
        mkdir -p cmdline-tools/latest
        mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/
        rm -rf cmdline.zip cmdline-tools-temp

        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

        yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null

        # Install common packages (adjust platform/build-tools versions to match your project)
        sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2" || sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-31" "build-tools;31.0.0"

    - name: Print Android SDK info
      run: |
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        ls -la "$ANDROID_SDK_ROOT"
        sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --list

    - name: Run Gradle assembleDebug (with logging)
      run: |
        set -o pipefail
        ./gradlew clean :app_pojavlauncher:assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
      continue-on-error: true

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload APKs and outputs
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          app_pojavlauncher/build/outputs/**/*.apk
          app_pojavlauncher/build/outputs/**/*.aab
          app_pojavlauncher/build/outputs/**/*.aar
          app_pojavlauncher/build/outputs/**/*.log
          app_pojavlauncher/build/outputs

    - name: Fail if build failed
      if: steps.build.outcome != 'success'
      run: |
        echo "Build failed. See build.log artifact for details."
        exit 1
