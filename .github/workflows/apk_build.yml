name: Build APK (assembleDebug)

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
  ANDROID_PLATFORM: 'android-36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  ANDROID_NDK_VERSION: '29.0.14206865'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y unzip wget zip

      - name: Install Android command-line tools
        run: |
          set -e
          mkdir -p "${ANDROID_SDK_ROOT}"
          cd "${ANDROID_SDK_ROOT}"
          CMDLINE_ZIP="commandlinetools-linux-9477386_latest.zip"
          if [ ! -f "${CMDLINE_ZIP}" ]; then
            wget -q "https://dl.google.com/android/repository/${CMDLINE_ZIP}" -O "${CMDLINE_ZIP}"
          fi
          mkdir -p cmdline-tools
          unzip -q -o "${CMDLINE_ZIP}" -d cmdline-tools
          if [ -d cmdline-tools/cmdline-tools ]; then
            mkdir -p cmdline-tools/latest
            mv -f cmdline-tools/cmdline-tools/* cmdline-tools/latest/ || true
          fi
          ls -la "${ANDROID_SDK_ROOT}/cmdline-tools"

      - name: Export Android SDK tools to PATH
        run: |
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -e
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
          yes | sdkmanager --licenses || true
          sdkmanager --update || true
          sdkmanager "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}" || true
          sdkmanager "ndk;${ANDROID_NDK_VERSION}" || echo "NDK ${ANDROID_NDK_VERSION} not available; continuing"

      - name: Show SDK layout (debug)
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la "${ANDROID_SDK_ROOT}" || true
          ls -la "${ANDROID_SDK_ROOT}/platforms" || true
          ls -la "${ANDROID_SDK_ROOT}/build-tools" || true
          sdkmanager --list || true

      - name: Build debug APK (assembleDebug) — save gradle log
        id: gradle_build
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -o pipefail
          ./gradlew --no-daemon :app_pojavlauncher:clean :app_pojavlauncher:assembleDebug -PdownloadAssets=false --info --stacktrace 2>&1 | tee gradle-build.log
          echo "EXIT=${PIPESTATUS[0]}" > gradle-exit-code.txt
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then
            echo "Gradle build failed with exit ${PIPESTATUS[0]}"
            exit ${PIPESTATUS[0]}
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app_pojavlauncher/build/outputs/**/*.apk

      - name: Upload gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: |
            gradle-build.log
            gradle-exit-code.txt

      - name: List outputs (debug)
        if: always()
        run: |
          echo "APK outputs directory listing:"
          ls -la app_pojavlauncher/build/outputs || true
